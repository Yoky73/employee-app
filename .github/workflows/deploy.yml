name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t yoky73/employee-app:latest .

      - name: Push Docker Image
        run: |
          docker push yoky73/employee-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull yoky73/employee-app:latest

            sudo docker stop employee-app || true
            sudo docker rm employee-app || true

            sudo docker run -d \
              --name employee-app \
              -p 80:3000 \
              --restart unless-stopped \
              yoky73/employee-app:latest